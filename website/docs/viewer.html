<script type="text/markdown" id="doc-00-使用指南.md"># Storydex 使用指南

本文是 Storydex 的基础使用说明，适合第一次使用 Storydex 的用户阅读，也适合作为 Storydex 内置 LLM 回答“怎么使用 Storydex”类问题时的事实来源。

## 1. Storydex 是什么

Storydex 是一个本地优先的小说工程写作系统。它不是单纯的聊天窗口，也不是普通文本编辑器，而是把小说项目当成一组可管理的创作资产：

- 正文章节和剧情片段
- 角色文件
- 变量与变量思考
- WIKI 与知识图谱
- 创作预设
- 版本控制
- Agent 执行记录

你可以把 Storydex 理解成：

```text
本地小说项目 + AI 协作写作 + 文件化资产管理 + 本地 Git 版本溯源
```

Storydex 的 Agent 基座是 Coomi。Coomi 负责理解用户请求、调用工具、流式执行和处理失败；Storydex 负责小说项目的目录、章节、角色、变量、WIKI、预设、版本记录等领域编排。

## 2. 桌面版运行环境

Storydex 桌面版采用：

```text
Electron 桌面壳 + 内置 Python 环境 + 内置 MinGit
```

普通用户不需要额外安装 Python，也不需要额外安装 Git。

### 内置 Python

桌面版会随程序携带后端运行所需的 Python 环境。启动 Storydex 时，桌面程序会自动启动本地后端服务。

### 内置 MinGit

桌面版会随程序携带 MinGit。Storydex 使用它为小说项目创建版本控制。

这不会修改用户系统的 Git 配置，也不会污染系统 PATH。Storydex 只会在自己的后端运行环境中优先使用内置 Git。

### 网络需求

Storydex 的项目文件、版本记录和大部分管理功能都在本地运行。需要联网的部分主要是：

- 调用 LLM 模型服务
- 首次配置或更新某些在线模型供应商信息
- 开发环境下安装或更新依赖

正式桌面版普通使用时，不应该要求用户自己运行 `pip install`。

## 3. 第一次启动建议流程

第一次打开 Storydex 时，建议按下面顺序完成初始化：

1. 打开 Storydex。
2. 选择一个小说项目目录，或者创建一个新的空目录。
3. 初始化 Storydex 项目骨架。
4. 配置 LLM Provider、API Key 和模型。
5. 选择默认章节目录模板。
6. 设置剧情片段数量和片段字数。
7. 决定是否开启自动更新变量、自动更新 WIKI。
8. 让 Agent 生成一小段测试剧情，确认写入、Diff 和版本控制正常。

推荐第一次测试时使用简单请求：

```text
请帮我创建一个新故事开头，生成 1 条剧情片段，约 800 字，并创建出现的新角色文件。
```

如果你还不熟悉 Storydex，建议先保持：

```text
片段数量：1
片段字数：800 到 2000
自动更新变量：关闭
自动更新 WIKI：关闭
```

自动更新变量需要较多耗时，建议每次仅生成单条剧情片段。

## 4. 小说项目目录

Storydex 的小说项目是一个普通本地文件夹。项目文件可以人工打开、编辑、备份，也可以由 Agent 自动管理。

一个典型项目会包含：

```text
chapters/              正文章节或剧情片段
characters/            角色文件
world/                 世界观、设定、地点、势力等
variables/             变量、变量思考和状态记录
wiki/ 或 .storydex/wiki/ WIKI 与知识图谱数据
presets/               创作预设
.storydex/             Storydex 项目配置、索引、模板和内部数据
.git/                  本地 Git 版本记录
```

实际目录可能因模板和项目设置不同而变化。基础骨架由 Storydex 维护，用户可以扩展目录，但不要手动删除 `.storydex/` 和 `.git/`。

## 5. Agent 能做什么

Storydex Agent 可以协助完成这些任务：

- 设计角色
- 更新角色文件
- 设计世界书或设定条目
- 设计剧本和剧情走向
- 续写或生成故事片段
- 整理变量思考
- 更新事实、关系和物品记录
- 整理 WIKI
- 更新知识图谱
- 整理项目目录
- 检查本轮修改
- 创建版本控制

适合的提示词例子：

```text
请根据当前章节继续写 1 条剧情片段，约 2000 字，保持当前文风。
```

```text
请整理最近三章中主角和反派关系的变化，并更新角色文件。
```

```text
请根据当前项目文件整理 WIKI，优先更新人物、地点和势力条目。
```

```text
请检查当前项目目录，把明显放错位置的角色设定和世界观设定整理到合适目录。
```

不推荐的提示词：

```text
随便写点。
```

```text
把所有东西都整理一下。
```

更好的方式是给 Agent 明确任务范围、目标文件、生成数量和是否允许更新变量或 WIKI。

## 6. 剧情生成流程

当你请求“生成剧情”“续写故事”“写章节片段”时，Storydex 会尽量按下面流程工作：

1. 判断这是故事创作或续写意图。
2. 检查当前项目章节结构。
3. 如果是全新故事，要求选择章节目录模板。
4. 读取 active 或 compiled safe 创作预设。
5. 读取近期章节、活跃角色、变量、事实和关系。
6. 按用户设置生成剧情片段。
7. 分析角色、物品、变量、事实、关系和 WIKI 的增量变化。
8. 为新出现的角色创建角色文件。
9. 缺失信息写为“未知”。
10. 根据设置或用户确认更新变量和 WIKI。
11. 写入项目文件。
12. 本轮执行结束后检查修改，并创建本地 Git 版本记录。

### 片段数量和片段字数

剧情生成支持设置：

```text
片段数量
片段字数
章节模板
```

建议：

- 想稳定推进剧情时，片段数量设为 1。
- 想批量生成草稿时，可以增加片段数量。
- 开启自动变量或自动 WIKI 时，建议片段数量保持 1。

## 7. 角色文件

剧情中出现的新角色应该自动创建角色文件。即使暂时没有足够信息，也应该创建基础文件，并把缺失字段写为“未知”。

角色文件会随剧情发展持续更新。Storydex 在生成上下文时通常只注入近期活跃角色，不会一次性把所有角色塞进 prompt。

如果你想让 Agent 更新角色，可以这样说：

```text
请根据最近两章，更新林澈和许清昼的角色文件，重点整理动机、关系变化和已知秘密。
```

## 8. 变量与变量思考

变量用于记录故事状态，例如：

- 人物关系
- 阵营立场
- 物品归属
- 伤势和状态
- 已知秘密
- 剧情旗标
- 世界规则变化

Storydex 的变量思考应优先使用可读、可维护的自然语言或 Markdown 形式。不要强行把变量思考写成难维护的固定 JSON 路径和值。

合适的变量思考应该说明：

- 发生了什么变化
- 哪些变化已经确定
- 哪些变化仍不确定
- 是否和旧设定冲突
- 是否建议用户确认后再写入

如果你希望 Agent 只思考变量、不直接更新，可以这样说：

```text
请只做变量思考，不要直接改变量文件。列出本章可能影响的角色关系、物品归属和剧情旗标。
```

## 9. WIKI 与知识图谱

WIKI 是故事事实的可视化和检索层。它不应该完全替代角色文件、变量文件和事实记忆。

WIKI 适合记录：

- 人物条目
- 地点条目
- 势力条目
- 重要物品
- 关键事件
- 世界规则
- 人物关系

知识图谱适合展示人物、地点、势力、物品和事件之间的关系。

如果你想整理 WIKI，可以这样说：

```text
请根据当前章节和角色文件整理 WIKI，优先更新人物、地点、势力和关键事件。
```

## 10. 创作预设

创作预设用于约束文风、剧情节奏、对白、人物行动、禁用内容和写作偏好。

Storydex 中的预设通常分为：

- library：预设库
- imported：导入预设
- blocked：禁用预设
- active：当前启用预设
- compiled safe preset：编译后的安全预设

只有 active 或 compiled safe preset 可以进入生成上下文。

如果你觉得生成内容风格不稳定，优先检查：

1. 当前启用的预设是否正确。
2. 是否启用了互相冲突的预设。
3. 预设内容是否过长或含糊。
4. 当前任务是否明确要求遵守某个风格。

## 11. 版本控制

Storydex 会使用本地 Git 为小说项目记录版本。

重要说明：

- Git 是纯版本控制。
- Storydex 不会自动推送到远程仓库。
- 桌面版会内置 MinGit，用户不需要安装 Git。
- 每次 Agent 执行结束时，如果检测到小说项目文件被修改，应自动创建本地提交。
- 如果没有文件变化，则不会创建无意义提交。

版本记录的作用：

- 查看本轮修改了哪些文件
- 查看 Diff
- 追溯某次 Agent 写入
- 在必要时恢复旧版本
- 理解故事项目的变化历史

如果你看到“本轮没有修改”，但确定 Agent 写了文件，可以检查：

1. 当前打开的是否是正确小说项目。
2. 文件是否写到了项目目录之外。
3. 后端是否正在使用内置 Git 或可用 Git。
4. 本轮执行是否尚未结束。

## 12. 修改预览和 Diff

执行过程中，Storydex 会显示本轮已修改内容。点击已修改内容，可以在中间文件区域查看 Diff。

Diff 只展示修改区域，不展示完整文件全文。这样更适合快速确认 Agent 改了什么。

如果当前没有修改文件，浮条会显示“暂无本轮修改”。

如果当前没有真实任务清单，浮条会显示“暂未规划”。Storydex 不应该为了显示任务而编造无意义任务。

## 13. 常见工作流

### 创建新故事

```text
请创建一个新故事开头，选择适合长篇连载的章节目录结构，生成 1 条约 2000 字的剧情片段。
```

### 续写当前章节

```text
请根据当前章节继续写 1 条剧情片段，约 2000 字。保持当前文风，注意角色动机和上一段结尾。
```

### 设计角色

```text
请设计一个新角色，作为主角早期的敌人。需要包含姓名、身份、外貌、动机、秘密和与主角的初始关系。
```

### 更新角色

```text
请根据最近两章更新所有活跃角色文件，重点整理关系变化、已知秘密和心理状态。
```

### 变量思考

```text
请对最近生成的剧情做变量思考，用自然语言列出人物关系、物品归属、剧情旗标和潜在冲突。不要输出固定 JSON。
```

### 更新 WIKI

```text
请根据当前项目文件更新 WIKI 和知识图谱，优先处理人物、地点、势力和关键事件。
```

### 整理目录

```text
请检查项目目录结构，把明显放错位置的设定、角色和章节文件整理到合适目录，不要破坏基础骨架。
```

## 14. 常见问题

### 我需要安装 Python 吗？

正式桌面版普通使用不需要。Storydex 会内置 Python 环境。

### 我需要安装 Git 吗？

正式桌面版普通使用不需要。Storydex 会内置 MinGit，并用于版本控制。

### Storydex 会把我的小说上传到远程仓库吗？

不会。Storydex 的 Git 版本记录是纯本地的。除非用户以后明确配置远程同步功能，否则不会自动推送远程。

### 为什么建议一次只生成一条剧情片段？

因为生成正文后还需要分析角色、变量、事实、关系和 WIKI 增量。片段越多，后续一致性处理越复杂。自动更新变量尤其耗时，建议每次仅生成单条剧情片段。

### 为什么新角色信息很多是“未知”？

这是正常的。剧情中出现了新角色，但暂时没有足够信息时，Storydex 仍应创建角色文件，并把缺失字段写为“未知”。后续剧情发展后再持续更新。

### 为什么任务清单显示“暂未规划”？

这表示本轮还没有收到真实任务规划事件。Storydex 不应该在前端编造任务。只有后端或 LLM 真正规划出的任务才会显示在任务清单里。

### 为什么 Diff 没有显示？

可能原因：

1. 本轮确实没有修改项目文件。
2. Agent 还在执行，修改账本尚未汇总。
3. 文件写入路径不在当前小说项目目录内。
4. Git 尚未初始化或不可用。
5. 后端没有收到写入工具的结构化修改路径。

如果是桌面封装版，应优先检查内置 MinGit 是否被正确加入后端运行环境。

### 我可以手动修改文件吗？

可以。Storydex 的项目文件是普通本地文件。手动修改后，建议在 Storydex 中刷新项目状态，并根据需要创建版本控制。

## 15. 给 Storydex LLM 的回答规则

当用户询问 Storydex 使用方法时，LLM 应优先检索并依据本文回答。

回答时应遵守：

1. 不要假设用户懂 Python、Git、FastAPI、Electron 或项目内部实现。
2. 先给可执行步骤，再补充原因。
3. 如果涉及版本记录，明确说明这是小说项目的本地 Git，不是 Storydex 源码仓库。
4. 如果涉及变量思考，优先推荐自然语言或 Markdown，不强制 JSON 路径和值。
5. 如果涉及剧情生成，提醒用户设置片段数量、片段字数和章节模板。
6. 如果涉及自动变量或自动 WIKI，提醒用户耗时会增加，建议单条剧情片段。
7. 如果用户问“为什么没有任务清单”，说明只有真实规划任务才显示，没有任务时显示“暂未规划”。
8. 如果用户问“是否需要安装 Python/Git”，说明正式桌面版会内置 Python 环境和 MinGit。

<script type="text/markdown" id="doc-01-LLM配置.md"># LLM 配置详细说明

LLM 配置用于告诉 Storydex：本地 Agent 应该连接哪个模型服务、使用哪个 API Key、默认使用哪个模型，以及工具调用协议如何处理。

配置文件通常位于：

```text
C:/Users/Septem/.storydex/.coomi/config/providers.json
```

## 什么时候需要配置

- 第一次安装 Storydex 后，还没有可用模型。
- 更换模型供应商、接口地址或 API Key。
- 标准模型和快速模型想分别使用不同模型。
- 工具调用异常，需要调整工具协议。
- 想把某个提供方设为当前默认提供方。

## 入口

1. 打开 Storydex。
2. 在右侧 Agent 面板顶部点击设置图标。
3. 打开 `LLM配置` 面板。

也可以从 Agent 面板顶部的模型/设置入口进入，最终都会打开同一个 LLM 配置窗口。

## 界面区域

| 区域 | 作用 |
| --- | --- |
| 顶部标题 `LLM配置` | 表示当前正在编辑 Coomi/Storydex 的模型提供方配置。 |
| `退出` | 关闭配置面板。关闭前如果没有保存，未保存内容不会可靠生效。 |
| `提供方` 下拉框 | 选择要查看或编辑的模型提供方。当前提供方会在名称后显示“当前”。 |
| `编辑提供方` | 当前选中的提供方详情。 |
| 底部操作区 | 显示配置文件路径，并提供保存、应用等操作。 |

## 顶部和底部按钮

| 按钮/图标 | 位置 | 作用 | 使用建议 |
| --- | --- | --- | --- |
| `退出` | 面板右上角 | 关闭 LLM 配置面板。 | 改完配置后先点 `保存` 或 `应用`，再退出。 |
| `+` / `新建提供方` | 提供方下拉框右侧 | 新增一个模型提供方配置。 | 接入新的服务商时使用，例如 OpenAI 兼容接口、Anthropic 或自定义网关。 |
| 删除图标 / `删除提供方` | `+` 右侧 | 删除当前选中的提供方。 | 删除前确认不是当前正在使用的配置；删除后需要保存。 |
| `设为当前` | 编辑提供方标题右侧 | 把当前提供方设为 Storydex 默认使用的模型提供方。 | 配好新提供方并测试无误后点击。 |
| `保存` | 面板底部 | 保存 providers.json，但不一定立即切换运行时。 | 批量编辑多个配置时先保存。 |
| `应用` | 面板底部 | 保存并让当前运行中的 Agent 配置生效。 | 改 API Key、模型名、当前提供方后优先点 `应用`。 |

键盘快捷键：

| 快捷键 | 作用 |
| --- | --- |
| `Ctrl+S` / `Cmd+S` | 保存当前 LLM 配置。 |

## 字段说明

| 字段 | 作用 | 示例 | 注意事项 |
| --- | --- | --- | --- |
| `提供方 ID` | 供应商配置的唯一标识。 | `opencode-go`、`openai-main` | 建议使用英文、数字、短横线；不要频繁修改，避免旧配置引用失效。 |
| `类型` | 提供方类型。 | `generic`、`openai`、`anthropic` | OpenAI 兼容服务通常可选 `generic` 或 `openai`，具体看接口兼容程度。 |
| `工具协议` | Agent 调用工具时采用的协议。 | `auto`、`native`、`structured`、`mimo`、`disabled` | 不确定时使用 `auto`；如果模型不支持工具调用，可临时使用 `disabled`。 |
| `显示名称` | 界面上展示给用户看的名称。 | `deepseek-v4-pro` | 不影响接口调用，只用于识别。 |
| `接口地址` | 模型 API 的 base URL。 | `https://example.com/v1` | OpenAI 兼容接口通常以 `/v1` 结尾。 |
| `API 密钥` | 调用模型服务需要的密钥。 | `sk-...` | 不要在截图、日志或公开文档中泄露真实密钥。 |
| `标准模型` | 复杂任务、长文生成、规划任务优先使用的模型。 | `deepseek-v4-pro` | 建议选择质量更高、上下文更稳的模型。 |
| `快速模型` | 简短任务、轻量判断、快速响应可使用的模型。 | `deepseek-v4-flash` | 可选择速度快、成本低的模型。 |
| `上下文窗口（tokens）` | 告诉 Storydex 当前模型的真实上下文窗口大小，Agent 的自动压缩阈值按它计算。 | `128000` | 按模型服务商标称的上下文长度填写；留空使用默认值。使用小上下文模型时建议如实填写，避免长对话溢出。 |

## 工具协议怎么选

| 协议 | 适用情况 |
| --- | --- |
| `auto` | 默认推荐。Storydex/Coomi 自动判断可用协议。 |
| `native` | 模型服务原生支持工具调用时使用。 |
| `structured` | 需要结构化工具调用，但服务商不完全支持原生工具协议时尝试。 |
| `mimo` | 兼容特定服务商或中间层的工具协议。 |
| `disabled` | 关闭工具调用，只让模型回答文本；排查工具调用问题时可临时使用。 |

如果出现“模型能聊天，但不能写文件/不能读项目/工具调用失败”，优先检查 `工具协议` 是否适合当前服务商。

## 常用操作

### 新增一个模型提供方

1. 打开 `LLM配置`。
2. 点击 `+`。
3. 填写 `提供方 ID`。
4. 选择 `类型`。
5. `工具协议` 先保持 `auto`。
6. 填写 `显示名称`、`接口地址`、`API 密钥`。
7. 填写 `标准模型` 和 `快速模型`。
8. 点击 `保存`。
9. 点击 `设为当前`。
10. 点击 `应用`。

### 更换 API Key

1. 在 `提供方` 下拉框选择要修改的提供方。
2. 修改 `API 密钥`。
3. 点击 `应用`。
4. 回到 Agent 面板发送一句简单请求，例如“请回复：配置测试成功”。

### 切换默认模型提供方

1. 在 `提供方` 下拉框选择目标提供方。
2. 点击 `设为当前`。
3. 点击 `应用`。
4. Agent 面板底部的模型状态会更新为当前配置。

### 删除不用的提供方

1. 在 `提供方` 下拉框选择要删除的提供方。
2. 点击删除图标。
3. 点击 `保存`。

删除前建议确认它不是唯一可用提供方。

## 和 Agent 面板的关系

LLM 配置只负责“模型从哪里来”。Agent 面板负责“本轮任务怎么执行”。

Agent 面板中常见状态包括：

| 项目 | 说明 |
| --- | --- |
| 当前模型 | 显示当前正在使用的模型名。 |
| 权限模式 | 控制 Agent 是否能读取、修改项目文件。 |
| 推理模式 | 控制本轮任务的推理强度或规划倾向。 |
| `片段数量` | 剧情生成时本轮生成几条片段，默认 1。 |
| `片段字数` | 每条剧情片段的目标字数，默认 2000。 |
| `章节模板` | 新故事或需要新章节结构时使用的章节目录模板。 |

## 注意事项

- Storydex 的 Agent 基座是 Coomi；Coomi 负责通用 Agent 能力，Storydex 负责小说项目编排。
- LLM 配置属于本机用户配置，不是小说项目内容。
- API Key 是敏感信息，不要写入小说正文、角色文件、WIKI 或公开仓库。
- 如果当前配置不可用，知识图谱等模块可能会退回本地解析模式，能展示基础信息，但深度生成能力会受限。

## 可以这样问 Agent

```text
请检查当前 LLM 配置是否能正常调用，并用一句话回复测试结果。
```

```text
如果我想用 OpenAI 兼容接口，LLM 配置里每个字段应该怎么填写？
```

```text
当前模型不能调用工具，可能需要调整哪个配置？
```

## 常见问题

### 保存和应用有什么区别？

`保存` 主要把配置写入 providers.json；`应用` 会让当前运行中的 Agent 尽量立即使用新配置。改完当前提供方、API Key 或模型名后，建议直接点 `应用`。

### 标准模型和快速模型可以一样吗？

可以。刚开始使用时可以填同一个模型，后续再根据成本和速度拆分。

### 为什么填了 API Key 还是失败？

常见原因有：接口地址不正确、模型名不存在、服务商不兼容当前工具协议、API Key 没有额度或权限、网络不可用。

### providers.json 可以手动编辑吗？

可以，但建议优先使用界面编辑。手动编辑后需要重新打开 LLM 配置或点击应用，让 Storydex 重新读取配置。
</script>
<script type="text/markdown" id="doc-02-目录结构与资源浏览器.md"># 目录结构与资源浏览器详细说明

资源浏览器用于打开小说项目、查看 Storydex 项目目录、创建文件/文件夹、打开正文和设定文件，以及通过右键菜单整理项目资源。

Storydex 项目本质上是一个普通本地文件夹。用户可以人工编辑，Agent 也可以在授权后自动管理。

## 入口

1. 打开 Storydex。
2. 点击左侧活动栏的资源图标。
3. 左侧面板会显示 `资源浏览器`。

如果还没有打开项目，会先显示欢迎状态，提供 `打开文件夹` 和 `新建项目`。

## 欢迎状态按钮

| 按钮 | 作用 | 什么时候使用 |
| --- | --- | --- |
| `打开文件夹` | 选择一个已有的本地写作目录。 | 已经有小说项目或想打开旧项目时使用。 |
| `新建项目` | 创建一个新的 Storydex 工作区。 | 第一次写新故事，或想建立独立测试项目时使用。 |

## 资源浏览器顶部区域

| 区域 | 说明 |
| --- | --- |
| `资源浏览器` | 当前面板标题。 |
| 项目名称 | 当前打开的小说项目名。 |
| 项目路径 | 当前小说项目所在的本地路径。 |
| 顶部工具栏 | 提供新建、刷新、保存等快捷操作。 |

## 顶部工具栏按钮

| 图标/按钮 | 标题 | 作用 | 使用方式 |
| --- | --- | --- | --- |
| `note_add` | `新建文件` | 在项目根目录新建文件。 | 点击后输入文件名，例如 `灵感.md`，按 Enter 确认。 |
| `create_new_folder` | `新建文件夹` | 在项目根目录新建文件夹。 | 点击后输入文件夹名，按 Enter 确认。 |
| `refresh` | `刷新` | 重新读取项目目录树。 | 手动改了文件，或 Agent 写入后列表没更新时使用。 |
| `save` | `保存` | 保存当前编辑器中已修改的文件。 | 文件内容有未保存修改时使用。 |

新建或重命名时：

| 操作 | 作用 |
| --- | --- |
| `Enter` | 确认创建或重命名。 |
| `Esc` | 取消创建或重命名。 |

## 常见项目目录

不同模板的项目会有差异，但典型 Storydex 项目会包含：

```text
.coomi/                         Coomi/Agent 运行相关数据
.storydex/                      Storydex 项目配置、模板、记忆、技能、追踪数据
.storydex/.agent/               Agent 技能、规则、记忆、计划和失败记录
.storydex/characters/           Storydex 内部角色索引或兼容目录
.storydex/config/               项目配置
.storydex/memory/               项目记忆、章节进度、当前变量等
.storydex/presets/active/       已启用预设
.storydex/presets/blocked/      禁用或阻止进入上下文的预设
.storydex/presets/compiled/     编译后的安全预设
.storydex/presets/library/      未启用预设库
.storydex/scripts/              脚本或剧本类资料
.storydex/temp/                 临时数据
.storydex/templates/            模板文件
.storydex/.agent/sessions/      Agent 会话历史和工作记录
.storydex/wiki/                 WIKI 和知识图谱相关数据
.storydex/worldbook/            世界书或设定资料
chapters/                       正文章节和剧情片段
.gitignore                      Git 忽略规则
README.md                       项目说明
```

用户可以扩展目录，但不要手动删除这些基础目录：

```text
.storydex/
.coomi/
.git/
```

其中 `.git/` 是小说项目的版本控制，不是 Storydex 源码仓库。

## 目录树操作

| 操作 | 结果 |
| --- | --- |
| 单击文件 | 在中间编辑区打开该文件。 |
| 单击文件夹左侧箭头 | 展开或收起文件夹。 |
| 单击章节目录的 `完成` 开关 | 标记该章节目录是否已完成。 |
| 右键文件 | 打开文件操作菜单。 |
| 右键文件夹 | 打开文件夹操作菜单。 |
| 右键空白区域 | 打开根目录操作菜单。 |
| 拖拽文件到文件夹 | 将文件移动到目标文件夹，适合整理目录。 |

## 章节目录的完成开关

章节目录行右侧可能出现 `完成` 开关。

| 状态 | 含义 |
| --- | --- |
| 关闭 | 该章节目录还在写作或未完成。 |
| 开启 | 该章节目录已完成。 |

这个状态会影响 Storydex 对章节进度的理解。建议在一个章节或一组剧情片段稳定后再标记完成。

## 根目录右键菜单

| 菜单项 | 作用 |
| --- | --- |
| `新建文件` | 在项目根目录创建文件。 |
| `新建文件夹` | 在项目根目录创建文件夹。 |
| `刷新` | 重新读取目录树。 |
| `保存` | 保存当前打开文件。 |
| `在资源管理器中显示` | 用系统文件管理器打开项目目录。 |

## 文件夹右键菜单

| 菜单项 | 作用 |
| --- | --- |
| `新建文件` | 在该文件夹下创建文件。 |
| `新建文件夹` | 在该文件夹下创建子文件夹。 |
| `在资源管理器中显示` | 在系统文件管理器中定位该文件夹。 |
| `添加到聊天` | 把该文件夹或其相关内容加入 Agent 上下文。 |
| `剪切` | 准备移动该文件夹。 |
| `复制` | 准备复制该文件夹。 |
| `粘贴` | 把剪切或复制的内容放入该文件夹。 |
| `复制路径` | 复制绝对路径。 |
| `复制相对路径` | 复制相对于项目根目录的路径。 |
| `重命名` | 修改文件夹名称。 |
| `删除` | 删除文件夹。 |

删除文件夹前请确认里面没有重要正文、角色或设定文件。

## 文件右键菜单

| 菜单项 | 作用 |
| --- | --- |
| `打开` | 在当前编辑区打开文件。 |
| `侧边打开` | 在侧边或分栏中打开文件。 |
| `打开方式` | 使用其他方式打开该文件。 |
| `在资源管理器中显示` | 在系统文件管理器中定位文件。 |
| `添加到聊天` | 把文件内容加入 Agent 本轮上下文。 |
| `剪切` | 准备移动文件。 |
| `复制` | 准备复制文件。 |
| `复制路径` | 复制文件绝对路径。 |
| `复制相对路径` | 复制相对于项目根目录的路径。 |
| `重命名` | 修改文件名。 |
| `删除` | 删除文件。 |

如果菜单中有灰色不可点击项，表示该功能暂未启用或当前状态不支持。

## 推荐的文件放置方式

| 内容 | 推荐位置 |
| --- | --- |
| 正文、剧情片段 | `chapters/` |
| 角色档案 | `characters/` 或模板指定的角色目录 |
| 世界观、势力、地点 | `worldbook/` 或 `.storydex/worldbook/` |
| WIKI 条目 | `wiki/` 或 `.storydex/wiki/` |
| 创作预设 | `.storydex/presets/` |
| 章节模板 | `.storydex/templates/chapters/` |
| 临时草稿 | `temp/` 或用户自建草稿目录 |

## 常用操作

### 打开已有项目

1. 点击左侧资源图标。
2. 点击 `打开文件夹`。
3. 选择小说项目根目录。
4. 等待资源树加载。
5. 确认 `chapters/`、`.storydex/` 等目录正常显示。

### 新建文件

1. 点击顶部 `新建文件`，或右键目标文件夹选择 `新建文件`。
2. 输入文件名，例如 `第001章.md`。
3. 按 Enter。
4. 点击新文件，在中间编辑区写内容。
5. 点击顶部 `保存`。

### 整理目录

1. 先刷新目录树。
2. 找到放错位置的文件。
3. 用拖拽、剪切/粘贴或重命名整理。
4. 整理后打开版本控制查看更改。
5. 如果是 Agent 整理，执行结束后应自动产生小说项目本地提交。

### 把文件交给 Agent 参考

1. 右键目标文件。
2. 选择 `添加到聊天`。
3. 在 Agent 输入框说明任务，例如“请根据这个角色文件更新最近章节里的称呼一致性”。

## 注意事项

- Storydex 可以管理普通 Markdown、文本和 JSON 文件，但普通用户不需要理解所有内部 JSON。
- `.storydex/` 是项目核心配置区，除非知道用途，不建议手动移动或删除。
- `.storydex/presets/active` 中的预设会影响生成上下文，移动预设前先确认用途。
- 章节目录模板决定新故事的组织方式，新故事开始前要慎重选择。
- 手动修改文件后，建议刷新资源树并查看版本控制。

## 可以这样问 Agent

```text
请检查当前项目目录，把明显放错位置的角色、设定和章节文件整理到合适目录，不要破坏基础骨架。
```

```text
请说明当前 Storydex 项目里每个一级目录的作用。
```

```text
请把当前打开的文件加入上下文，并根据它更新相关角色档案。
```

## 常见问题

### 为什么欢迎页还有历史记录或其他侧栏？

欢迎页表示还没有正式打开项目。此时资源浏览器应只引导打开文件夹或新建项目；如果仍看到项目历史或右侧内容，可能是界面状态没有重置，刷新或重新打开 Storydex 后再试。

### 我可以自己建目录吗？

可以。Storydex 允许项目扩展目录。只要不删除基础骨架，用户可以按自己的创作习惯增加资料夹。

### 为什么有些文件夹是红色或有标记？

通常表示该目录或其子项存在诊断信息、变更状态或需要注意的项目状态。可以点击或右键查看具体文件。

### 删除文件后能恢复吗？

如果小说项目已经初始化版本控制，通常可以通过本地 Git 历史找回旧版本。删除重要文件前仍建议先确认。
</script>
<script type="text/markdown" id="doc-03-版本控制.md"># 版本控制详细说明

`版本控制` 是 Storydex 为用户的小说项目提供的本地 Git 版本管理界面。它用于记录项目文件每一次重要变化，方便查看 Diff、追踪 Agent 写入、回退旧版本。

重点：这里管理的是小说项目的本地 Git 仓库，不是 Storydex 源码仓库，也不会自动推送到远程仓库。

## 入口

1. 打开一个 Storydex 小说项目。
2. 点击左侧活动栏的版本控制图标。
3. 打开 `版本控制` 面板。

如果当前没有打开项目，面板会提示先打开 Storydex 项目。

## 界面区域

| 区域 | 说明 |
| --- | --- |
| 顶部标题 `版本控制` | 当前模块名称。 |
| 项目名称 | 当前正在管理的小说项目。 |
| `提交仓库` | 当前本地 Git 仓库状态、分支、提交消息和提交按钮。 |
| `更改` | 当前未提交的文件变化列表。 |
| `图表` | 最近的本地提交历史。 |

## 顶部按钮

| 按钮/图标 | 作用 |
| --- | --- |
| `刷新` | 重新读取 Git 状态、变更文件和提交历史。 |

## 未初始化状态

如果项目还没有 Git 仓库，会看到 `初始化本地仓库`。

| 按钮 | 作用 |
| --- | --- |
| `初始化本地仓库` | 在当前小说项目中创建本地 `.git/` 仓库。初始化后，Storydex 才能记录版本、展示 Diff 和提交图表。 |

初始化后，Storydex 会使用小说项目内的本地 Git 记录变化。

## 提交仓库区域

| 元素 | 说明 |
| --- | --- |
| 分支标签 | 显示当前分支，例如 `main`。 |
| 最近提交摘要 | 显示当前 HEAD 的提交说明，例如 `workspace: snapshot ...`。 |
| 更改数量 | 显示当前工作区有多少项更改。 |
| 提交消息输入框 | 输入本次提交说明。占位提示通常是 `消息(Ctrl+Enter 在 "main" 提交)`。 |
| `提交` 按钮 | 把当前更改提交到小说项目的本地 Git 仓库。 |

快捷键：

| 快捷键 | 作用 |
| --- | --- |
| `Ctrl+Enter` | 在当前分支提交。 |

## Agent 自动提交规则

Storydex 的设计目标是：每一次 Agent 执行结束后，如果检查到小说项目文件被修改，就自动创建本地 Git commit。

规则如下：

| 情况 | 结果 |
| --- | --- |
| Agent 修改了小说项目文件 | 执行结束后自动创建本地提交。 |
| Agent 没有修改项目文件 | 不创建空提交。 |
| 用户手动改了文件 | 可以在版本控制里手动提交。 |
| Git 不可用或仓库未初始化 | 无法提交，需要先初始化或修复 Git 环境。 |

桌面封装版会内置 MinGit，普通用户不需要额外安装 Git。

## 更改列表

`更改` 区域列出当前未提交的文件。

| 状态 | 含义 |
| --- | --- |
| `M` | Modified，已有文件被修改。 |
| `U` | Untracked/Added，新文件或未跟踪文件。 |
| `D` | Deleted，文件被删除。 |

文件行通常显示：

| 内容 | 说明 |
| --- | --- |
| 文件名 | 被修改的文件名。 |
| 相对目录 | 文件所在位置。 |
| 状态字母 | 本次变化类型。 |

点击更改文件行，会在中间文件区域打开 Git review / Diff 视图。

## Diff 预览

Diff 用于查看文件哪里变了。

| 操作 | 结果 |
| --- | --- |
| 点击 `更改` 里的文件 | 打开该文件的 Diff。 |
| 展开文件 | 查看具体修改片段。 |
| 收起文件 | 隐藏该文件修改详情。 |

Storydex 的 Diff 预览应优先展示修改区域，而不是把完整文件全文都塞出来。这样更适合快速确认 Agent 改了什么。

## 图表区域

`图表` 区域显示最近的本地提交历史。

| 内容 | 说明 |
| --- | --- |
| 提交线 | 展示本地提交的先后关系。 |
| 提交说明 | 例如 `workspace: snapshot ...`、`story: update chapters...`。 |
| 作者/时间 | 提交者和提交时间。 |
| 短哈希 | 例如 `a657fa9`，用于识别某次提交。 |

点击旧提交时，Storydex 会要求确认是否回退到该版本。回退前系统会先保留当前状态的本地备份分支，再恢复到所选提交。

## 常用操作

### 初始化版本控制

1. 打开小说项目。
2. 进入 `版本控制`。
3. 点击 `初始化本地仓库`。
4. 等待初始化完成。
5. 确认出现分支名和提交区域。

### 手动提交当前修改

1. 进入 `版本控制`。
2. 查看 `更改` 列表，确认修改文件符合预期。
3. 在提交消息输入框写说明，例如 `story: update chapter 3 draft`。
4. 点击 `提交`，或按 `Ctrl+Enter`。
5. 提交完成后，更改列表应变为空或减少。

### 查看某个文件的 Diff

1. 展开 `更改`。
2. 点击目标文件。
3. 在中间区域查看修改片段。
4. 如果内容很多，只看高亮的修改区域即可。

### 回退到旧版本

1. 展开 `图表`。
2. 找到想恢复的旧提交。
3. 点击该提交。
4. 阅读确认提示。
5. 确认后，Storydex 会先创建备份分支，再恢复到所选提交。

回退是高影响操作，建议只在确认当前内容需要撤回时使用。

## 和 Agent 执行浮条的关系

Agent 执行过程中，如果本轮有文件修改，浮条的“已修改内容”应显示本轮修改文件。点击文件后，可以在中间区域查看本轮 Diff。

版本控制则是更完整的版本视图，用于查看当前工作区和历史提交。

## 注意事项

- 版本控制不会自动上传到远程仓库。
- 如果用户把小说项目复制到其他电脑，`.git/` 目录也需要一起复制，历史记录才会保留。
- 不要把 Storydex 源码仓库的提交规则和小说项目提交规则混在一起。
- Agent 自动提交只应针对当前小说项目文件，不应提交 Storydex 源码文件。
- 如果自动提交失败，优先检查 Git 是否可用、项目是否初始化、本轮是否真的有项目文件变化。

## 可以这样问 Agent

```text
请总结本轮修改了哪些小说项目文件，并说明每个文件变化的目的。
```

```text
请查看当前版本控制，告诉我最近 5 次提交分别做了什么。
```

```text
请帮我检查当前更改列表，判断是否适合提交。
```

## 常见问题

### 为什么明明生成了内容，但更改列表为空？

可能原因：

1. Agent 还没有执行结束。
2. 文件写到了当前小说项目目录之外。
3. Git 状态还没刷新。
4. 项目没有初始化本地 Git。
5. 写入失败或被权限/路径问题阻止。

先点击 `刷新`，再检查资源浏览器里的文件是否真的变化。

### 为什么自动提交没有出现？

自动提交只在 Agent 执行结束后检查。如果执行还在进行中，或本轮没有项目文件变化，就不会提交。

### 可以推送到远程吗？

当前说明中的版本记录是纯本地用途。Storydex 不会默认把用户小说项目推送到远程仓库。

### 初始化 Git 会影响系统 Git 吗？

不会。桌面版会使用内置 MinGit，主要作用于当前小说项目目录。
</script>
<script type="text/markdown" id="doc-04-预设管理.md"># 预设管理详细说明

预设管理用于管理 Storydex 的创作规则，例如文风、剧情节奏、对话习惯、人物行动约束、禁用内容、采样参数和临时规则。

预设是文件化管理的。用户可以通过界面导入、启用、停用和编辑，也可以在项目目录中人工查看。

## 入口

1. 打开 Storydex 小说项目。
2. 点击左侧活动栏的预设管理图标。
3. 打开 `预设管理` 面板。

## 预设目录

预设通常位于：

```text
.storydex/presets/
```

常见子目录：

```text
.storydex/presets/active/       已启用预设
.storydex/presets/library/      未启用预设库
.storydex/presets/blocked/      禁用预设
.storydex/presets/compiled/     编译后的预设
```

只有 `active` 或编译后的预设可以进入本轮生成上下文。

## 界面区域

| 区域 | 说明 |
| --- | --- |
| 顶部标题 `预设管理` | 当前模块名称。 |
| 项目名称 | 当前小说项目名称。 |
| `目录 .storydex/presets` | 预设文件所在目录。 |
| 导入工作台 | 用于导入外部预设。 |
| `已启用` | 当前会影响生成上下文的预设。 |
| `未启用` | 已保存但不会注入上下文的预设。 |

## 顶部按钮

| 图标/按钮 | 标题 | 作用 |
| --- | --- | --- |
| 导入图标 | `导入` | 选择外部预设文件并进入导入预览。 |
| 刷新图标 | `刷新` | 重新读取预设目录。 |

## 导入工作台

| 元素 | 作用 |
| --- | --- |
| `导入` 按钮 | 打开文件选择器，选择要导入的预设。 |

导入后会进入 `导入预览`，不是立即启用。

## 导入预览窗口

| 区域/按钮 | 作用 |
| --- | --- |
| `导入预览` 标题 | 查看即将导入的预设内容。 |
| 关闭按钮 `X` | 关闭导入预览。 |
| 模块数量 | 显示预设中识别出的模块数量。 |
| 宏提示 | 显示导入时保留的外部预设专有宏。 |
| `模块列表` | 查看预设包含哪些模块。 |
| `宏提示` | 查看按原文保留、运行时兼容层会尽量展开的宏或特殊语法。 |
| `展示正则` | 查看展示/匹配相关的正则规则。 |
| `SPreset ChatSquash 元数据` | 查看导入文件中携带的元信息。 |
| `取消` | 放弃本次导入。 |
| `确认导入` | 把预设写入 Storydex 项目。 |

建议导入前先看宏提示。外部预设里的专有宏会尽量保留原文，后续运行时兼容层再决定如何展开。

## 预设列表行

| 元素 | 说明 |
| --- | --- |
| 文件图标 | 表示这是一个预设文件。 |
| 预设名称 | 例如 `00 小说人称预设.md`。 |
| 副标题 | 通常显示文件名或路径。 |
| 参数图标 `tune` | 打开该预设的参数编辑器。 |
| 启用/停用开关 | 在 `active` 和 `library` 之间移动预设。 |
| `MD` 等扩展名标记 | 显示文件类型。 |

## 已启用和未启用

| 区域 | 含义 | 对生成的影响 |
| --- | --- | --- |
| `已启用` | 位于 `.storydex/presets/active` 的预设。 | 会被 Context Assembler 视为可注入上下文的来源。 |
| `未启用` | 位于 `.storydex/presets/library` 的预设。 | 保存在项目中，但默认不影响生成。 |

预设不是越多越好。启用太多互相冲突的规则，会让生成变慢或风格不稳定。

## 预设行按钮

| 按钮/图标 | 作用 |
| --- | --- |
| 点击预设行 | 在中间编辑区打开预设文件。 |
| `tune` / `编辑参数` | 打开结构化参数编辑器。 |
| `toggle_on` / `停用` | 把已启用预设移回 library。 |
| `toggle_off` / `激活` | 把未启用预设移动到 active。 |

## 参数编辑器

点击 `编辑参数` 后，会打开预设参数编辑器。

### 顶部按钮

| 按钮 | 作用 |
| --- | --- |
| `保存` | 保存当前预设参数。 |

### 编辑模式

| 模式 | 作用 |
| --- | --- |
| `结构化编辑` | 用表单编辑采样参数、长度约束、风格规则、思考阶段等。 |
| `写作工作台` | 编辑临时写作规则、自由文本、写作偏好等更贴近创作的内容。 |
| `注入预览` | 查看当前预设最终会注入给模型的文本。 |
| `风险体检` | 查看预设是否存在冲突、过长、特殊宏或不兼容内容。 |

### 常见参数

| 参数 | 作用 | 建议 |
| --- | --- | --- |
| `temperature` | 控制随机性。越高越发散。 | 小说可略高，但不要过高。 |
| `top_p` | 控制候选词采样范围。 | 通常保持默认。 |
| `top_k` | 限制候选词数量。 | 不确定时保持默认。 |
| `frequency_penalty` | 减少重复用词。 | 重复明显时小幅提高。 |
| `presence_penalty` | 鼓励引入新内容。 | 剧情停滞时可小幅提高。 |
| `seed` | 随机种子。 | 需要复现实验时填写。 |
| 正文字数下限/目标/上限 | 控制正文片段长度。 | 与 Agent 面板的片段字数保持一致更稳。 |
| 段落长度下限/上限 | 控制段落密度。 | 长篇小说建议避免段落过长。 |
| 思考阶段 | 让 Agent 在生成前按步骤规划。 | 适合复杂剧情、变量更新、WIKI 整理。 |
| 视角/叙述者 | 控制 POV 和叙述风格。 | 与小说主风格保持一致。 |
| 禁用词/禁用模式 | 避免某些词、桥段或表达。 | 不要写得过宽，否则会误伤正常内容。 |
| 风格规则 | 约束文风、对白、描写方式。 | 用自然语言写清楚，不要堆太多互斥要求。 |

## 常用操作

### 导入外部预设

1. 打开 `预设管理`。
2. 点击顶部 `导入`。
3. 选择预设文件。
4. 在 `导入预览` 中查看模块列表和宏提示。
5. 确认可用后点击 `确认导入`。
6. 导入后通常先进入 `未启用`。
7. 需要使用时再点击启用开关。

### 启用预设

1. 在 `未启用` 中找到目标预设。
2. 点击该行右侧的启用开关。
3. 预设会移动到 `已启用`。
4. 下一轮生成时，它才可能进入上下文。

### 停用预设

1. 在 `已启用` 中找到目标预设。
2. 点击停用开关。
3. 预设会移动回 `未启用`。
4. 后续生成不再默认使用它。

### 编辑预设参数

1. 点击预设行右侧 `tune`。
2. 在 `结构化编辑` 中调整参数。
3. 打开 `注入预览` 检查实际注入文本。
4. 打开 `风险体检` 查看问题。
5. 点击 `保存`。

## 预设编写建议

- 写清楚“应该做什么”，少写模糊口号。
- 不要同时启用互相冲突的文风预设。
- 不要把整本 WIKI 或全部角色档案塞进预设。
- 预设应负责规则，项目事实应放在角色、变量、WIKI 和记忆里。
- 对剧情、对话、人物行动约束，可以使用 Markdown 自然语言表达。

## 和变量思考的关系

变量思考不建议做成难维护的硬性 JSON 条目。更推荐用自然语言或 Markdown 写清楚：

- 本轮有哪些状态变化。
- 哪些变化已确定。
- 哪些变化不确定。
- 是否与旧设定冲突。
- 是否建议写入变量文件。

预设可以约束变量思考的风格，但不要强迫用户维护固定 JSON 路径和值。

## 可以这样问 Agent

```text
请检查当前已启用预设，告诉我是否有互相冲突的风格要求。
```

```text
请根据我的长篇连载需求，帮我整理一份适合启用的预设组合。
```

```text
请解释这个预设里的每一条规则会怎样影响剧情生成。
```

## 常见问题

### 预设启用了为什么没有生效？

可能原因：

1. 预设没有放在 `active`。
2. 预设太长，被上下文预算压缩或跳过。
3. 当前任务不需要使用该预设。
4. 预设内容和其他规则冲突。
5. 还没有保存或刷新。

### 可以直接编辑预设 Markdown 吗？

可以。预设是文件化管理的。编辑后建议保存，并在预设管理中刷新或查看注入预览。

### blocked 是什么？

`blocked` 用于放置明确不应进入运行时上下文的预设。它可以作为保留区或禁用区。

### compiled preset 是什么？

它是经过整理或编译后适合注入运行时的预设版本，目的是让运行时读取到稳定的预设结构。
</script>
<script type="text/markdown" id="doc-05-知识图谱.md"># 知识图谱详细说明

知识图谱用于把 Storydex 小说项目中的角色、关系、剧情、设定和项目概览可视化。它是故事事实的检索和展示层，不替代角色文件、变量文件、正文和 WIKI。

知识图谱可以由 LLM 深度生成，也可以在 LLM 不可用时使用本地解析结果进行基础展示。

## 入口

1. 打开 Storydex 小说项目。
2. 点击左侧活动栏的知识图谱图标。
3. 打开 `知识图谱` 面板。

## 界面区域

| 区域 | 说明 |
| --- | --- |
| 顶部标题 `知识图谱` | 当前模块名称。 |
| 顶部操作按钮 | 生成图谱、更新 WIKI、审阅 WIKI、刷新。 |
| 分类标签 | 在角色关系、角色档案、剧情、设定、项目概览之间切换。 |
| 搜索框 | 搜索条目、节点或关系。 |
| 中间图谱画布 | 展示节点和关系。 |
| 右侧详情面板 | 展示项目概览、节点详情、关系证据和相关条目。 |
| 底部缩放控件 | 缩小、放大、适配视图。 |

## 顶部按钮

| 图标/按钮 | 标题 | 作用 | 适合场景 |
| --- | --- | --- | --- |
| `auto_awesome` | `Agent 深度生成知识图谱` | 调用 Agent 对项目进行更深入的知识图谱生成。 | 新项目导入后、章节大量变化后、需要更完整关系网络时。 |
| `published_with_changes` | `Agent 增量更新 WIKI` | 根据最近变化增量更新 WIKI。 | 生成新剧情、角色关系变化、变量变化后。 |
| `fact_check` | `Agent 审阅 WIKI` | 审阅 WIKI 条目是否准确、一致、可维护。 | WIKI 变多、设定冲突、角色信息不一致时。 |
| `refresh` | `刷新` | 重新读取当前知识图谱和 WIKI 数据。 | 手动改文件或 Agent 执行结束后。 |

## 分类标签

| 标签 | 作用 |
| --- | --- |
| `角色关系` | 重点展示角色之间的关系网络。 |
| `角色档案` | 查看角色条目、角色摘要和来源文件。 |
| `剧情` | 查看事件、章节、剧情节点。 |
| `设定` | 查看世界观、地点、势力、规则等设定条目。 |
| `项目概览` | 查看项目整体摘要、来源文件数量、图谱构建信息。 |

标签后面的数字表示当前分类下可用条目数量。

## 搜索与统计

| 元素 | 作用 |
| --- | --- |
| `搜索条目、节点或关系` | 输入角色名、地点、势力、事件关键词。 |
| 清除按钮 | 清空当前搜索。 |
| `节点 · 连接` | 显示当前图谱节点和关系数量。 |
| `待确认` | 表示有条目可能需要用户确认或审阅。 |

搜索适合快速定位某个角色、关系或设定来源。

## 图谱画布操作

| 操作 | 结果 |
| --- | --- |
| 鼠标滚轮 | 放大或缩小图谱。 |
| 拖动画布空白处 | 平移视图。 |
| 点击节点 | 在右侧详情面板查看节点信息。 |
| 拖动节点 | 调整节点位置，方便观察关系。 |
| 点击连线 | 查看两端节点的关系、强度和证据。 |
| 点击图例 | 理解不同颜色或类型节点的含义。 |

## 底部缩放按钮

| 按钮 | 作用 |
| --- | --- |
| `-` / `缩小` | 缩小图谱。 |
| 百分比 | 当前缩放比例。 |
| `+` / `放大` | 放大图谱。 |
| `fit_screen` / `适配视图` | 自动调整视图，让图谱尽量完整显示。 |

如果图谱节点跑到视野外，优先点击 `适配视图`。

## 右侧详情面板

右侧详情会根据当前选择变化。

### 项目概览

| 内容 | 说明 |
| --- | --- |
| 项目名称 | 当前小说项目名。 |
| 生成方式 | 例如 LLM 生成、本地推断、local fallback。 |
| 更新时间 | 图谱或 WIKI 最近更新时间。 |
| 项目总览 | 对项目内容的摘要。 |
| 工作区路径 | 当前项目本地路径。 |
| 章节/正文文件数量 | 被图谱读取到的正文来源数量。 |
| 识别角色数量 | 当前识别到的候选角色数量。 |
| 索引来源文件 | 被用于构建图谱的文件数量。 |
| 来源路径 | 支撑该概览的项目文件路径。 |

### 节点详情

| 内容 | 说明 |
| --- | --- |
| 类型 | 角色、地点、势力、事件、设定等。 |
| 标题 | 节点名称。 |
| 审阅状态 | 是否需要确认、是否已审阅。 |
| 来源标签 | 该信息来自正文、角色文件、WIKI 或本地推断。 |
| 摘要 | 节点的简要说明。 |
| 细节 | 更具体的事实或设定。 |
| 来源路径 | 支撑该节点的文件路径。 |
| 相关条目 | 和该节点关联的其他条目，可点击跳转。 |

### 关系详情

| 内容 | 说明 |
| --- | --- |
| 关系类型 | 角色关系、章节共现、势力关联等。 |
| 两端节点 | 关系连接的两个对象。 |
| 强度 | 关系强弱或共现频率。 |
| 证据 | 支撑该关系的章节、描述或 WIKI 片段。 |

## 常用操作

### 第一次生成知识图谱

1. 打开小说项目。
2. 进入 `知识图谱`。
3. 点击 `Agent 深度生成知识图谱`。
4. 等待 Agent 读取项目文件并生成图谱。
5. 生成后点击 `刷新`。
6. 在 `项目概览` 查看来源文件和统计数量。

### 剧情生成后更新 WIKI

1. 完成新剧情生成。
2. 确认角色、物品、变量、事实和关系增量。
3. 进入 `知识图谱`。
4. 点击 `Agent 增量更新 WIKI`。
5. 等待 Agent 更新 WIKI。
6. 点击 `刷新` 查看图谱变化。

如果开启了自动更新 WIKI，Storydex 可以在变量更新后自动执行，但仍建议定期审阅。

### 审阅 WIKI

1. 点击 `Agent 审阅 WIKI`。
2. 让 Agent 检查条目是否重复、冲突或过期。
3. 根据结果确认需要更新的 WIKI 文件。
4. 查看版本控制中的 Diff。

## 知识图谱和 WIKI 的关系

| 项目 | 作用 |
| --- | --- |
| 角色文件 | 存放角色档案，是角色事实的重要来源。 |
| 变量文件 | 存放当前故事状态、关系、物品归属、旗标等。 |
| WIKI | 面向阅读和检索的事实条目。 |
| 知识图谱 | 把角色、事件、设定和关系可视化。 |

知识图谱不应该替代角色文件和变量文件。它更像“地图”和“检索层”。

## 注意事项

- 图谱中的关系可能来自推断，重要设定仍建议写回角色文件、变量或 WIKI。
- `local fallback` 表示 LLM 不可用时的本地构建结果，质量可能不如 Agent 深度生成。
- 自动更新 WIKI 会增加耗时；和自动更新变量一起使用时，建议每次只生成单条剧情片段。
- 如果图谱节点太密集，可以切换分类、搜索关键词或点击适配视图。

## 可以这样问 Agent

```text
请根据当前项目深度生成知识图谱，重点整理角色关系、势力关系和关键事件。
```

```text
请增量更新 WIKI，只处理最近生成剧情中新增或变化的角色、地点、物品和关系。
```

```text
请审阅当前 WIKI，找出重复条目、设定冲突和来源不清的内容。
```

```text
请解释知识图谱里“青萝”和“秘密”的关系证据来自哪里。
```

## 常见问题

### 为什么图谱里角色很多但关系很少？

可能是项目文件里角色出现了，但缺少明确互动或关系描述。可以让 Agent 深度生成图谱，或先整理角色文件和最近章节。

### 为什么右侧显示 local fallback？

表示当前图谱是本地解析构建的基础结果。通常是 LLM 不可用、未配置或生成失败时出现。

### 图谱中的内容一定准确吗？

不一定。图谱可能包含模型推断或本地解析结果。重要事实应以正文、角色文件、变量文件和 WIKI 为准。

### 更新 WIKI 会直接改文件吗？

如果 Agent 具备修改权限，更新 WIKI 会写入小说项目文件。执行结束后若有修改，应产生本地 Git 提交，方便追踪。
</script>
<script type="text/markdown" id="doc-06-系统设置.md"># 系统设置详细说明

系统设置用于调整 Storydex 的界面主题、工作台布局、项目级写作设置，以及桌面版软件更新。

系统设置分为两类：

| 类型 | 保存位置 | 作用 |
| --- | --- | --- |
| 界面与布局设置 | 本机用户配置 | 影响 Storydex 在当前电脑上的显示和布局。 |
| 项目设置 | 小说项目 `.storydex/config/project-settings.json` | 影响当前小说项目的章节、剧情片段和 Agent 提交行为。 |

## 入口

1. 点击左侧活动栏底部的设置图标。
2. 在设置菜单中选择系统设置。
3. 打开 `系统设置` 窗口。

系统设置是弹窗形式。可以点击右上角关闭，也可以点击弹窗外部关闭。

## 界面区域

| 区域 | 说明 |
| --- | --- |
| 左侧标题 `系统设置` | 当前窗口名称。 |
| 搜索框 | 搜索设置分类，例如主题、章节、布局。 |
| 左侧分类导航 | 切换不同设置分类。 |
| 右侧设置卡片 | 编辑当前分类的具体设置。 |
| 卡片右上角按钮 | 重新加载、保存、关闭。 |

## 左侧搜索框

| 元素 | 作用 |
| --- | --- |
| `搜索设置（主题、章节、布局）` | 输入关键词过滤设置分类。 |
| 搜索结果提示 | 显示找到几个匹配分类，或提示没有匹配分类。 |

常用关键词：

```text
主题
字体
布局
资源栏
Agent
章节
剧情片段
更新
```

## 左侧分类

| 分类 | 作用 |
| --- | --- |
| `界面与主题` | 设置界面主题、文件字体大小、玩家模式字体大小。 |
| `工作台布局` | 设置资源栏宽度、Agent 栏宽度。 |
| `项目设置` | 设置当前小说项目的剧情片段格式、每章片段上限、章节目录命名和 Agent 提交提示。 |
| `更新与关于` | 查看当前版本、检查并安装桌面版更新。 |

## 卡片右上角按钮

| 图标/按钮 | 标题 | 作用 |
| --- | --- | --- |
| `refresh` | `重新加载` | 放弃当前未保存编辑，重新读取该分类设置。 |
| `save` | `保存` | 保存当前分类设置。 |
| `close` | `关闭` | 关闭系统设置窗口。 |

界面与布局通常会自动保存；项目设置建议修改后点击 `保存`。

## 界面与主题

### 界面主题

主题区域显示多个主题卡片。

| 操作 | 结果 |
| --- | --- |
| 点击主题卡片 | 切换 Storydex 界面主题。 |
| 查看主题预览色块 | 快速判断主题风格。 |

主题设置会影响整个应用外观，不影响小说项目内容。

### 字体大小

| 设置项 | 范围 | 作用 |
| --- | --- | --- |
| `文件显示字体大小` | 12-24 px | 调整中间文件编辑/预览区域的字体大小。 |
| `玩家模式字体大小` | 12-28 px | 调整玩家模式或阅读模式的字体大小。 |

拖动滑块即可调整。界面会显示当前像素值。

## 工作台布局

| 设置项 | 范围 | 作用 |
| --- | --- | --- |
| `资源栏宽度` | 220-520 px | 调整左侧资源浏览器等侧栏宽度。 |
| `Agent 栏宽度` | 320-760 px | 调整右侧 Agent 面板宽度。 |

如果资源树文件名显示不完整，可以加宽资源栏。如果 Agent 对话和任务浮条拥挤，可以加宽 Agent 栏。

## 项目设置

项目设置必须先打开小说项目才可用。保存路径通常为：

```text
.storydex/config/project-settings.json
```

顶部信息条会显示：

| 项目 | 说明 |
| --- | --- |
| `来源` | 当前设置来源，例如 API 优先或本地文件。 |
| `更新` | 设置最近更新时间。 |
| `路径` | 当前项目设置文件路径。 |

### 剧情片段扩展名

| 选项 | 作用 |
| --- | --- |
| `Markdown .md` | 新剧情片段使用 Markdown 文件。推荐默认使用。 |
| `Text .txt` | 新剧情片段使用纯文本文件。 |

如果需要标题、列表、注释等结构，推荐 `.md`。

### 每章剧情片段上限

| 设置 | 说明 |
| --- | --- |
| `每章剧情片段上限` | 控制每个章节目录最多容纳多少个剧情片段。 |
| 范围 | 1-99。 |

这个设置用于约束章节目录结构。截图中的示例值为 3，表示每章最多 3 个剧情片段。

### 自动命名章节目录

| 状态 | 含义 |
| --- | --- |
| 开启 | Storydex 自动按规则命名章节目录，兼容历史项目。 |
| 关闭 | 用户或模板更明确地控制章节目录名称。 |

如果旧项目依赖自动命名，可以保持开启。新项目如果有明确章节模板，可以按模板管理。

### Agent 结束后询问提交

| 状态 | 含义 |
| --- | --- |
| 开启 | 检测到小说项目有未提交修改时弹出提交确认。 |
| 关闭 | Agent 执行结束后按系统规则自动处理本地提交，不额外询问。 |

如果 Storydex 已按“Agent 执行结束且有修改就自动提交”的规则运行，可以关闭询问，减少打断。

## 更新与关于

`更新与关于` 用于查看当前版本并完成桌面版应用内更新。浏览器中运行时该功能不可用，只在桌面版生效。

| 元素 | 说明 |
| --- | --- |
| `当前版本` | 当前安装的 Storydex 版本号。 |
| `可用新版本` | 检查到新版本时显示目标版本号。 |
| `检查更新` | 向更新服务器查询是否有新版本。 |
| `下载更新（增量）` | 下载新版本。默认使用差分更新，只传输与当前版本有变化的部分。 |
| 下载进度条 | 显示下载百分比、已传输与总大小。 |
| `重启并安装` | 下载完成后重启应用并安装新版本。 |

### 差分更新说明

- 下载更新时，Storydex 只下载新旧版本安装包之间有差异的数据块，通常远小于完整安装包，可显著节省流量和等待时间。
- 首次通过应用内更新升级时，本地没有可比对的旧安装包，会下载完整安装包；之后的每次升级自动使用增量下载。
- 差分下载不可用时会自动回退为完整下载，更新不会因此失败。

## 常用操作

### 检查并安装更新

1. 打开 `系统设置` -> `更新与关于`。
2. 点击 `检查更新`。
3. 如有新版本，点击 `下载更新（增量）`。
4. 等待下载完成，点击 `重启并安装`。
5. 应用会自动重启进入新版本。

### 调整主题

1. 打开 `系统设置`。
2. 进入 `界面与主题`。
3. 点击喜欢的主题卡片。
4. 观察界面是否切换成功。

### 调整编辑器字体

1. 进入 `界面与主题`。
2. 拖动 `文件显示字体大小`。
3. 打开一个正文文件检查阅读舒适度。

### 调整侧栏宽度

1. 进入 `工作台布局`。
2. 调整 `资源栏宽度` 或 `Agent 栏宽度`。
3. 观察左右面板是否适合当前屏幕。

### 修改剧情片段格式

1. 打开小说项目。
2. 进入 `系统设置` -> `项目设置`。
3. 在 `剧情片段扩展名` 中选择 `.md` 或 `.txt`。
4. 点击 `保存`。
5. 后续新生成片段会按该格式创建。

### 修改每章片段上限

1. 打开 `项目设置`。
2. 修改 `每章剧情片段上限`。
3. 点击 `保存`。
4. 后续章节组织会参考新上限。

## 和 Agent 剧情生成设置的关系

系统设置里的 `每章剧情片段上限` 是项目结构规则；Agent 面板里的 `片段数量` 是本轮生成数量。

例如：

| 设置 | 含义 |
| --- | --- |
| 每章剧情片段上限 = 3 | 一个章节目录最多放 3 个片段。 |
| 本轮片段数量 = 1 | 这次只生成 1 个片段。 |
| 本轮片段字数 = 2000 | 这次每个片段目标约 2000 字。 |

如果开启自动更新变量或自动更新 WIKI，建议本轮片段数量保持 1，因为自动更新变量需要较多耗时。

## 注意事项

- 界面和布局设置主要影响当前电脑，不改变小说内容。
- 项目设置会写入当前小说项目，可能进入本地 Git 版本记录。
- 修改项目设置后，如果看到版本控制出现 `project-settings.json` 变化，这是正常现象。
- 没有打开项目时，项目设置不可编辑。
- 新手用户优先只改主题、字体和 Agent 栏宽度，项目结构设置可以保持默认。

## 可以这样问 Agent

```text
请说明当前项目设置里每个选项会怎样影响剧情生成。
```

```text
我想每章放 3 个片段，每段约 2000 字，应该怎么设置？
```

```text
请检查 project-settings.json，告诉我当前章节目录命名和剧情片段格式。
```

## 常见问题

### 为什么项目设置打不开？

需要先打开一个 Storydex 小说项目。没有项目时，系统设置只能调整界面和布局。

### 调整字体会影响导出的小说吗？

不会。字体大小只影响 Storydex 界面显示，不修改正文文件内容。

### 每章片段上限会删除多余片段吗？

不应该。它是组织规则，不应自动删除已有正文。已有内容应通过目录整理或 Agent 规划处理。

### 应用内更新每次都要下载完整安装包吗？

不需要。除首次应用内更新外，后续升级默认使用差分更新，只下载新旧版本之间有变化的部分。

### 改项目设置后为什么版本记录有变化？

项目设置写入 `.storydex/config/project-settings.json`，属于小说项目文件。Storydex 记录这类变化是为了保证可追溯。

<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var file = params.get('file');
    var container = document.getElementById('docContent');

    if (!file) {
        container.innerHTML = '<div class="error">未指定文档文件。请从 <a href="./index.html">文档目录</a> 中选择。</div>';
        return;
    }

    var el = document.getElementById('doc-' + file);
    if (!el) {
        container.innerHTML = '<div class="error">找不到文档: ' + file + '<br><br><a href="./index.html">&larr; 返回文档目录</a></div>';
        return;
    }

    var md = el.textContent;
    if (!md || !md.trim()) {
        container.innerHTML = '<div class="error">文档内容为空: ' + file + '<br><br><a href="./index.html">&larr; 返回文档目录</a></div>';
        return;
    }

    container.innerHTML = renderMarkdown(md);
    document.title = file.replace('.md', '') + ' - Storydex 帮助文档';

    function renderMarkdown(md) {
        md = md.replace(/^\uFEFF/, '');
        var lines = md.split('\n');
        var html = '';
        var inCodeBlock = false;
        var codeContent = '';
        var inList = false;
        var listTag = '';

        function closeList() {
            if (inList) { html += '</' + listTag + '>'; inList = false; }
        }

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.trim().startsWith('```')) {
                if (inCodeBlock) {
                    html += '<pre><code>' + escapeHtml(codeContent.trim()) + '</code></pre>';
                    codeContent = ''; inCodeBlock = false;
                } else { closeList(); inCodeBlock = true; }
                continue;
            }
            if (inCodeBlock) { codeContent += (codeContent ? '\n' : '') + line; continue; }
            if (line.trim() === '') { closeList(); continue; }
            if (line.startsWith('#### ')) { closeList(); html += '<h4>' + renderInline(line.slice(5)) + '</h4>'; continue; }
            if (line.startsWith('### ')) { closeList(); html += '<h3>' + renderInline(line.slice(4)) + '</h3>'; continue; }
            if (line.startsWith('## ')) { closeList(); html += '<h2>' + renderInline(line.slice(3)) + '</h2>'; continue; }
            if (line.startsWith('# ')) { closeList(); html += '<h1>' + renderInline(line.slice(2)) + '</h1>'; continue; }
            if (/^(-{3,}|_{3,}|\*{3,})$/.test(line.trim())) { closeList(); html += '<hr>'; continue; }
            if (line.startsWith('> ')) { closeList(); html += '<blockquote><p>' + renderInline(line.slice(2)) + '</p></blockquote>'; continue; }
            // Table detection
            if (line.trim().startsWith('|') && i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim())) {
                closeList();
                var tableRows = [line, lines[i + 1]];
                i += 2;
                while (i < lines.length && lines[i].trim().startsWith('|')) { tableRows.push(lines[i]); i++; }
                i--;
                html += renderTable(tableRows);
                continue;
            }
            var olMatch = line.match(/^(\d+)\.\s+(.+)/);
            if (olMatch) {
                if (!inList || listTag !== 'ol') { closeList(); html += '<ol>'; inList = true; listTag = 'ol'; }
                html += '<li>' + renderInline(olMatch[2]) + '</li>'; continue;
            }
            var ulMatch = line.match(/^[-*+]\s+(.+)/);
            if (ulMatch) {
                if (!inList || listTag !== 'ul') { closeList(); html += '<ul>'; inList = true; listTag = 'ul'; }
                html += '<li>' + renderInline(ulMatch[1]) + '</li>'; continue;
            }
            closeList();
            html += '<p>' + renderInline(line) + '</p>';
        }
        closeList();
        if (inCodeBlock && codeContent) { html += '<pre><code>' + escapeHtml(codeContent.trim()) + '</code></pre>'; }
        return html;
    }

    function renderInline(text) {
        text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
        text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
        text = text.replace(/_(.+?)_/g, '<em>$1</em>');
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
        return text;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderTable(rows) {
        var h = '<table>';
        var hCells = rows[0].split('|').filter(function(c) { return c.trim(); });
        h += '<thead><tr>';
        hCells.forEach(function(c) { h += '<th>' + renderInline(c.trim()) + '</th>'; });
        h += '</tr></thead><tbody>';
        for (var r = 2; r < rows.length; r++) {
            var cells = rows[r].split('|').filter(function(c) { return c.trim(); });
            h += '<tr>';
            cells.forEach(function(c) { h += '<td>' + renderInline(c.trim()) + '</td>'; });
            h += '</tr>';
        }
        h += '</tbody></table>';
        return h;
    }
})();
</script>
</body>
</html>
